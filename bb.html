<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <section class="w-full min-h-screen bg-white flex flex-col">

        <div class="flex justify-between items-center px-8 py-6">
            <div class="w-16 h-8 bg-gray-300"></div>

            <nav class="flex gap-8 text-sm">
                <a href="#">Services</a>
                <a href="#">Doctors</a>
                <a href="#">Testimonials</a>
                <a href="#">Contact</a>
            </nav>
        </div>

        <div class="grid md:grid-cols-2 flex-1">

            <div class="flex items-center px-8 py-12">
                <div>
                    <h1 class="text-4xl font-bold leading-tight mb-8 max-w-md">
                        Best Medical Clinic in Lalitpur for Family Healthcare & Specialist Services
                    </h1>

                    <p class="text-gray-700 text-lg max-w-md mb-10">
                        We offer family healthcare, specialist consultations, preventive care, and personalized treatment plans to help you and your loved ones stay healthy.
                    </p>

                    <a href="#"
                        class="border border-gray-500 px-6 py-3 inline-block hover:bg-gray-100">
                        Book Appointment
                    </a>
                </div>
            </div>

            <div class="h-full">
                <img
                    src="images/clinic.jpg"
                    alt="Medical Clinic"
                    class="w-full h-full object-cover">
            </div>

        </div>

        <div class="h-10 bg-indigo-100"></div>

    </section>
    
</body>
</html>
